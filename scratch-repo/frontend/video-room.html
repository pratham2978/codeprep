<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Interview Room | CodePrep</title>
    <!-- Load Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #1a1d2d;
            --primary: #fbbf24;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .room-header {
            height: 60px;
            background: var(--panel-bg);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .r-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .timer {
            font-family: 'Fira Code', monospace;
            background: rgba(251, 191, 36, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 140px); /* header + controls */
        }

        /* Videos Panel */
        .videos-panel {
            width: 380px;
            background: #000;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .video-container {
            flex: 1;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 2px solid #000;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror camera */
            background: #000;
        }

        .name-tag {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .peer-placeholder {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #3b82f6, #2dd4bf);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }

        .peer-animation {
            position: absolute;
            top: 20px; right: 20px;
            display: flex;
            gap: 4px;
        }
        
        .dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--success);
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Editor Panel */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }
        
        .editor-tabs {
            height: 44px;
            background: var(--panel-bg);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
        }

        .e-tab {
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-dark);
            border-right: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            color: var(--primary);
            border-top: 2px solid var(--primary);
        }

        #editor-container {
            flex: 1;
            width: 100%;
        }

        /* Bottom Controls */
        .controls-bar {
            height: 80px;
            background: var(--panel-bg);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .ctrl-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            outline: none;
        }

        .ctrl-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        
        .ctrl-btn.off {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .btn-end {
            background: var(--danger);
            border: none;
            border-radius: 24px;
            padding: 0 24px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 50px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-end:hover { background: #dc2626; transform: translateY(-2px); }
        
    </style>
</head>
<body>

    <!-- Header -->
    <header class="room-header">
        <div class="r-title">
            <i class="fa-solid fa-code" style="color: var(--primary);"></i> 
            Mock Interview: Arrays & Hashing (Medium)
        </div>
        <div class="timer">
            <i class="fa-regular fa-clock"></i> <span id="timeDisplay">45:00</span>
        </div>
    </header>

    <!-- Workspace -->
    <div class="workspace">
        
        <!-- Videos column -->
        <div class="videos-panel">
            <!-- Peer Video Feed (Simulated) -->
            <div class="video-container" id="alex-container">
                <div class="peer-placeholder">A</div>
                <div class="peer-animation" id="alex-anim" style="display:none;">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <div class="name-tag">
                    <i class="fa-solid fa-microphone-lines-slash" style="color: var(--danger);" id="alex-mic"></i> 
                    Alex D. (Peer)
                </div>
                <div id="alex-caption" style="position:absolute; top:20px; left:20px; right:20px; background:rgba(0,0,0,0.6); padding:10px; border-radius:8px; font-size:0.9rem; text-align:center; color:#fff; border:1px solid rgba(255,255,255,0.1); display:none; z-index:20;"></div>
            </div>
            
            <!-- Local User Video Feed -->
            <div class="video-container">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="name-tag">
                    <i class="fa-solid fa-microphone" id="localMicIcon" style="color: var(--success);"></i> 
                    You
                </div>
                <div id="camOffOverlay" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:#111; z-index:5; align-items:center; justify-content:center;">
                    <div class="peer-placeholder" style="background: rgba(255,255,255,0.1); box-shadow: none;">U</div>
                </div>
            </div>
        </div>

        <!-- Editor column -->
        <div class="editor-panel">
            <div class="editor-tabs">
                <div class="e-tab"><i class="brands fa-java" style="margin-right:8px; color:#fbbf24;"></i> TwoSum.java</div>
                <div style="flex:1;"></div>
                <button style="background: var(--success); border:none; color:#fff; font-weight:600; padding: 0 20px; cursor:pointer; transition:0.2s;"><i class="fa-solid fa-play"></i> Run Code</button>
            </div>
            <div id="editor-container"></div>
        </div>

    </div>

    <!-- Controls -->
    <div class="controls-bar">
        <button class="ctrl-btn" id="micBtn" onclick="toggleMic()" title="Toggle Microphone">
            <i class="fa-solid fa-microphone"></i>
        </button>
        <button class="ctrl-btn" id="camBtn" onclick="toggleCam()" title="Toggle Camera">
            <i class="fa-solid fa-video"></i>
        </button>
        <button class="ctrl-btn" title="Share Screen (Simulated)" onclick="alert('Google Chrome wants to share the contents of your screen. (Simulated)')">
            <i class="fa-solid fa-display"></i>
        </button>
        <button class="ctrl-btn" title="Chat Logs" onclick="alert('Opening Peer Chat...')">
            <i class="fa-solid fa-message"></i>
        </button>
        <a href="mock-interview.html" class="btn-end" style="text-decoration:none;">
            <i class="fa-solid fa-phone-slash"></i> End Call
        </a>
    </div>

    <!-- Scripts -->
    <script>
        // Start Local Video Feed
        let localStream;
        let isMicOn = true;
        let isCamOn = true;

        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoEl = document.getElementById('localVideo');
                videoEl.srcObject = localStream;
            } catch (err) {
                console.error("Error accessing media devices.", err);
                const overlay = document.getElementById('camOffOverlay');
                overlay.style.display = 'flex';
                overlay.innerHTML += '<p style="position:absolute; bottom:20px; color:#ef4444; font-size:0.8rem; text-align:center;">Camera/Mic Access Denied.</p>';
                
                // Set UI to off states visually
                isMicOn = false; isCamOn = false;
                document.getElementById('micBtn').classList.add('off');
                document.getElementById('micBtn').innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                document.getElementById('camBtn').classList.add('off');
                document.getElementById('camBtn').innerHTML = '<i class="fa-solid fa-video-slash"></i>';
            }
        }

        function toggleMic() {
            if(!localStream) return;
            isMicOn = !isMicOn;
            
            // Note: Since some browsers bundle mic/video streams tightly, getting the correct track is vital.
            const audioTracks = localStream.getAudioTracks();
            if(audioTracks.length > 0) audioTracks[0].enabled = isMicOn;
            
            const btn = document.getElementById('micBtn');
            const icon = document.getElementById('localMicIcon');
            
            if(isMicOn) {
                btn.classList.remove('off');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                icon.className = 'fa-solid fa-microphone';
                icon.style.color = 'var(--success)';
            } else {
                btn.classList.add('off');
                btn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                icon.className = 'fa-solid fa-microphone-slash';
                icon.style.color = 'var(--danger)';
            }
        }

        function toggleCam() {
            if(!localStream) return;
            isCamOn = !isCamOn;
            
            const videoTracks = localStream.getVideoTracks();
            if(videoTracks.length > 0) videoTracks[0].enabled = isCamOn;
            
            const btn = document.getElementById('camBtn');
            const overlay = document.getElementById('camOffOverlay');
            
            if(isCamOn) {
                btn.classList.remove('off');
                btn.innerHTML = '<i class="fa-solid fa-video"></i>';
                overlay.style.display = 'none';
            } else {
                btn.classList.add('off');
                btn.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
                overlay.style.display = 'flex';
            }
        }

        // Timer Logic
        let timeLeft = 45 * 60; // 45 minutes
        setInterval(() => {
            if(timeLeft <= 0) return;
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timeDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);

        // Load Monaco Editor dynamically mimicking a live collaborative IDE
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            
            // Define custom transparent deep dark theme 
            monaco.editor.defineTheme('codeprep-dark', {
                base: 'vs-dark', inherit: true,
                rules: [],
                colors: { 
                    'editor.background': '#0f111a',
                    'editor.lineHighlightBackground': '#1a1d2d',
                    'editorLineNumber.foreground': '#475569'
                }
            });
            
            var editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: 'class Solution {\n    public int[] twoSum(int[] nums, int target) {\n        // Your peer is waiting for you to start typing...\n        \n        return new int[]{};\n    }\n}',
                language: 'java',
                theme: 'codeprep-dark',
                automaticLayout: true,
                fontSize: 16,
                fontFamily: "'Fira Code', monospace",
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                padding: { top: 24 }
            });
            
        });

        // Init camera on window load
        window.addEventListener('load', initCamera);

        // --- ALEX AI PEER IMPLEMENTATION ---
        const AlexAI = {
            synth: window.speechSynthesis,
            recognition: null,
            state: 0,
            isListening: false,
            silenceTimer: null,
            latestTranscript: "",
            
            init() {
                // Ensure voices load
                this.synth.getVoices();
                
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    this.recognition = new SpeechRecognition();
                    this.recognition.continuous = true;
                    this.recognition.interimResults = true;
                    
                    this.recognition.onresult = (event) => {
                        let finalTxt = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            if (event.results[i].isFinal) finalTxt += event.results[i][0].transcript + " ";
                        }
                        if(finalTxt.trim().length > 0) {
                            this.latestTranscript += finalTxt;
                            this.resetSilenceTimer();
                        }
                    };
                    
                    this.recognition.onend = () => {
                        if(this.isListening) {
                            try { this.recognition.start(); } catch(e){}
                        } 
                    };
                }
                
                // Start sequence after 3.5 seconds to simulate connecting/setup
                setTimeout(() => this.speak("Hey there, my name is Alex. Are you ready to start the interview?"), 3500);
            },
            
            speak(text) {
                this.stopListening();
                
                // UI updates
                document.getElementById('alex-anim').style.display = 'flex';
                document.getElementById('alex-mic').className = 'fa-solid fa-microphone';
                document.getElementById('alex-mic').style.color = 'var(--success)';
                
                const caption = document.getElementById('alex-caption');
                caption.style.display = 'block';
                caption.innerText = `"${text}"`;
                
                if (this.synth.speaking) this.synth.cancel();
                
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 0.95; // Slightly lower pitch for a male-leaning default
                
                let voices = this.synth.getVoices();
                let preferredVoice = voices.find(v => v.lang.includes('en-US') && (v.name.includes('Male') || v.name.includes('Google UK English Male'))) || voices[0];
                if (preferredVoice) utterance.voice = preferredVoice;
                
                utterance.onend = () => {
                    document.getElementById('alex-anim').style.display = 'none';
                    document.getElementById('alex-mic').className = 'fa-solid fa-microphone-slash';
                    document.getElementById('alex-mic').style.color = 'var(--danger)';
                    setTimeout(() => caption.style.display = 'none', 1500);
                    
                    this.latestTranscript = ""; // clear buffer before listening again
                    this.startListening();
                };
                
                this.synth.speak(utterance);
            },
            
            startListening() {
                if(!this.recognition) return;
                this.isListening = true;
                try { this.recognition.start(); } catch(e){}
                this.resetSilenceTimer(); // Ensure we timeout safely if they never speak
            },
            
            stopListening() {
                this.isListening = false;
                clearTimeout(this.silenceTimer);
                if(this.recognition) this.recognition.stop();
            },
            
            resetSilenceTimer() {
                clearTimeout(this.silenceTimer);
                // If user doesn't speak for 3 seconds after final input, trigger processing
                this.silenceTimer = setTimeout(() => {
                    if(this.latestTranscript.trim().length > 0) {
                        this.processResponse(this.latestTranscript.toLowerCase());
                    }
                }, 3000);
            },
            
            processResponse(input) {
                // Show thinking animation
                document.getElementById('alex-anim').style.display = 'flex';
                
                fetch('http://localhost:8080/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: input })
                })
                .then(res => res.json())
                .then(data => {
                    this.speak(data.reply);
                })
                .catch(err => {
                    console.error('API Error:', err);
                    this.speak("I'm sorry, I lost connection to the backend server. Make sure your Spring Boot application is running.");
                });
            }
        };

        // Boot the simulated agent environment on load
        window.addEventListener('load', () => AlexAI.init());

    </script>
</body>
</html>
