<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CodePrep</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 2rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 16px;
            text-decoration: none;
            color: #fff;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-wrapper label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-left: 4px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        .auth-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .auth-actions label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .forgot-pass {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-pass:hover {
            color: #fdba74;
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            justify-content: center;
            margin-top: 8px;
            font-size: 1.05rem;
        }

        .social-login {
            margin-top: 32px;
            text-align: center;
        }

        .social-login p {
            color: var(--text-muted);
            font-size: 0.85rem;
            position: relative;
            margin-bottom: 20px;
        }

        .social-login p::before,
        .social-login p::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--glass-border);
        }

        .social-login p::before { left: 0; }
        .social-login p::after { right: 0; }

        .social-btns {
            display: flex;
            gap: 16px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .auth-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="bg-system">
        <div class="grid-overlay"></div>
        <div class="ambient-orb orb-primary" style="top: 10%; left: 20%;"></div>
        <div class="ambient-orb orb-secondary" style="bottom: 10%; right: 20%;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo"><i class="fa-solid fa-code text-gradient"></i> CodePrep</a>
                <h1>Welcome Back</h1>
                <p>Enter your details to access your account</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="input-wrapper">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="john@example.com" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="auth-actions">
                    <label>
                        <input type="checkbox" class="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-glow btn-submit">Sign In</button>
            </form>

            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-btns">
                    <button class="btn-social"><i class="fa-brands fa-google text-gradient"></i> Google</button>
                    <button class="btn-social"><i class="fa-brands fa-github text-main"></i> GitHub</button>
                </div>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
