<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOP Concepts | CodePrep</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            overflow-y: auto;
        }

        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px 80px;
            position: relative;
            z-index: 10;
        }

        .oops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
            gap: 24px;
            margin-top: 36px;
        }

        @media(max-width:600px) {
            .oops-grid {
                grid-template-columns: 1fr;
            }
        }

        .oops-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s;
        }

        .oops-card:hover {
            border-color: rgba(167, 139, 250, 0.35);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .card-top-bar {
            background: rgba(167, 139, 250, 0.06);
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-subject {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #a78bfa;
            letter-spacing: 0.06em;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 6px 0 0;
        }

        .card-body {
            padding: 20px 24px;
        }

        .content-text {
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .code-block {
            background: #0f111a;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 16px;
            margin-top: 14px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #e2e8f0;
            overflow-x: auto;
            white-space: pre;
        }

        .card-footer {
            padding: 0 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mark-complete-btn {
            padding: 8px 18px;
            background: rgba(167, 139, 250, 0.12);
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: #a78bfa;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .mark-complete-btn:hover {
            background: rgba(167, 139, 250, 0.25);
        }

        .mark-complete-btn.done {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .diff-tag {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .t-Beginner {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .t-Intermediate {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        .t-Advanced {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="bg-system">
        <div class="grid-overlay"></div>
    </div>
    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-code text-gradient"></i> CodePrep</div>
        <div class="nav-links"><a href="interview-prep.html">← Interview Prep</a></div>
    </nav>
    <div class="page-wrap">
        <div style="text-align:center;margin-bottom:20px;">
            <div
                style="display:inline-block;padding:6px 16px;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);border-radius:20px;color:#a78bfa;font-weight:600;font-size:0.85rem;margin-bottom:16px;">
                <i class="fa-solid fa-cubes"></i> Object-Oriented Programming</div>
            <h1 class="hero-title" style="font-size:3rem;margin-bottom:12px;">OOP <span
                    class="text-gradient">Mastery</span></h1>
            <p class="hero-subtitle" style="max-width:560px;margin:0 auto;">SOLID principles, design patterns, and
                pillars of OOP — with code examples. Track your learning.</p>
            <div style="margin-top:20px;display:flex;align-items:center;gap:12px;justify-content:center;">
                <input type="text" id="username-field" placeholder="Your name..."
                    style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 14px;color:#fff;font-family:'Inter',sans-serif;">
                <button onclick="loadProgress()"
                    style="background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.3);padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;">Load
                    Progress</button>
            </div>
        </div>
        <!-- Progress header -->
        <div
            style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px 24px;display:flex;align-items:center;gap:16px;margin-bottom:12px;">
            <i class="fa-solid fa-circle-half-stroke" style="color:#a78bfa;font-size:1.3rem;"></i>
            <div style="flex:1;">
                <div
                    style="display:flex;justify-content:space-between;font-size:0.85rem;color:#94a3b8;margin-bottom:6px;">
                    <span>OOP Progress</span><span id="prog-label">0%</span></div>
                <div style="height:6px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;">
                    <div style="height:100%;background:linear-gradient(90deg,#a78bfa,#c4b5fd);border-radius:6px;transition:width 0.6s;"
                        id="prog-bar"></div>
                </div>
            </div>
        </div>
        <div class="oops-grid" id="oops-grid">
            <div style="grid-column:1/-1;padding:40px;text-align:center;color:#64748b;"><i
                    class="fa-solid fa-spinner fa-spin fa-2x"></i></div>
        </div>
    </div>
    <script>
        const API = 'http://localhost:8080/api/study';
        let topics = [], completedIds = new Set();
        let username = localStorage.getItem('codeprep_username') || '';
        if (username) document.getElementById('username-field').value = username;

        async function init() {
            try {
                const res = await fetch(`${API}/topics?module=oops`);
                topics = await res.json();
                if (username) await loadProgress();
                renderGrid();
            } catch (e) {
                document.getElementById('oops-grid').innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:#ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Backend offline.</div>`;
            }
        }

        function renderGrid() {
            const done = completedIds.size; const total = topics.length;
            const pct = total ? Math.round(done / total * 100) : 0;
            document.getElementById('prog-bar').style.width = pct + '%';
            document.getElementById('prog-label').textContent = `${done}/${total} (${pct}%)`;

            document.getElementById('oops-grid').innerHTML = topics.map(t => {
                const isDone = completedIds.has(t.id);
                return `<div class="oops-card">
                    <div class="card-top-bar">
                        <div><div class="card-subject">${t.subject}</div><div class="card-title">${t.title}</div></div>
                        <span class="diff-tag t-${t.difficulty}">${t.difficulty}</span>
                    </div>
                    <div class="card-body">
                        <div class="content-text">${t.content}</div>
                        ${t.codeExample ? `<div class="code-block">${escHtml(t.codeExample)}</div>` : ''}
                    </div>
                    <div class="card-footer">
                        <button class="mark-complete-btn${isDone ? ' done' : ''}" id="btn-${t.id}" onclick="markDone(${t.id})">
                            ${isDone ? '<i class="fa-solid fa-check-circle"></i> Completed' : '<i class="fa-regular fa-circle-check"></i> Mark Complete'}
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        async function markDone(id) {
            const name = document.getElementById('username-field').value.trim() || 'Anonymous';
            username = name; localStorage.setItem('codeprep_username', name);
            try {
                await fetch(`${API}/progress/complete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, topicId: id }) });
                completedIds.add(id); renderGrid();
            } catch (e) { }
        }

        async function loadProgress() {
            const name = document.getElementById('username-field').value.trim(); if (!name) return;
            username = name; localStorage.setItem('codeprep_username', name);
            try {
                const res = await fetch(`${API}/progress?username=${encodeURIComponent(name)}`);
                const data = await res.json();
                completedIds = new Set(data.completedTopicIds); renderGrid();
            } catch (e) { }
        }

        function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        init();
    </script>
</body>

</html>
